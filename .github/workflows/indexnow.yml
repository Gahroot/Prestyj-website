name: IndexNow auto-ping

# Pings IndexNow (Bing, Yandex, Naver, Seznam, Yep) with the URLs of any new
# blog posts or pages added on a push to `main`. Diff-based — only NEW URLs
# are submitted, so we never spam the endpoint.
#
# Snapshot of previously-submitted URLs lives at data/indexnow/submitted-urls.json
# and is committed back by this workflow.

on:
  push:
    branches: [main]
    paths:
      - "content/blog/**"
      - "src/lib/alternatives/**"
      - "src/lib/solutions/**"
      - "src/lib/best-for/**"
      - "src/lib/locations/**"
      - "scripts/indexnow-diff.ts"
      - "data/indexnow/submitted-urls.json"
  workflow_dispatch:

concurrency:
  group: indexnow-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Submit new URLs to IndexNow
        env:
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        run: npm run indexnow:diff

      - name: Commit updated snapshot
        run: |
          if git diff --quiet data/indexnow/submitted-urls.json; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/indexnow/submitted-urls.json
          git commit -m "chore(indexnow): update submitted-urls snapshot [skip ci]"
          git push
