name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Build needs a DATABASE_URL for `prisma generate`; a dummy is fine since we don't connect.
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
