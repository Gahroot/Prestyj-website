name: SEO Bot Daily Run

on:
  schedule:
    - cron: '0 7 * * *'  # 7am UTC daily
  workflow_dispatch:
    inputs:
      tasks:
        description: 'Comma-separated task list (override rotation)'
        required: false
      dryRun:
        description: 'Dry run (no commit)'
        type: boolean
        default: false

jobs:
  daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Configure git
        run: |
          git config user.name "seo-bot"
          git config user.email "seo-bot@prestyj.com"
      - name: Run daily SEO bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
            npx tsx scripts/seo-bot/cli.ts daily --dry-run
          elif [ -n "${{ github.event.inputs.tasks }}" ]; then
            npx tsx scripts/seo-bot/cli.ts daily --tasks "${{ github.event.inputs.tasks }}"
          else
            npx tsx scripts/seo-bot/cli.ts daily
          fi
      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-bot-reports-${{ github.run_id }}
          path: scripts/seo-bot/output/reports/
          retention-days: 30
