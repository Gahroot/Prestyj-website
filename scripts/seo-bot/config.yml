baseUrl: https://prestyj.com

providers:
  anthropic:
    type: anthropic
    apiKeyEnv: ANTHROPIC_API_KEY
    defaultModel: claude-sonnet-4-6
  anthropic-haiku:
    type: anthropic
    apiKeyEnv: ANTHROPIC_API_KEY
    defaultModel: claude-haiku-4-5-20251001
  gemini:
    type: gemini
    apiKeyEnv: GEMINI_API_KEY
    defaultModel: gemini-2.5-flash
  gemini-pro:
    type: gemini
    apiKeyEnv: GEMINI_API_KEY
    defaultModel: gemini-2.5-pro
  deepseek:
    type: openai-compat
    apiKeyEnv: DEEPSEEK_API_KEY
    baseURL: https://api.deepseek.com/v1
    defaultModel: deepseek-chat
  qwen:
    type: openai-compat
    apiKeyEnv: DASHSCOPE_API_KEY
    baseURL: https://dashscope-intl.aliyuncs.com/compatible-mode/v1
    defaultModel: qwen-plus
  moonshot:
    type: openai-compat
    apiKeyEnv: MOONSHOT_API_KEY
    baseURL: https://api.moonshot.ai/v1
    defaultModel: kimi-k2-0905-preview
  groq:
    type: openai-compat
    apiKeyEnv: GROQ_API_KEY
    baseURL: https://api.groq.com/openai/v1
    defaultModel: llama-3.3-70b-versatile
  openrouter:
    type: openai-compat
    apiKeyEnv: OPENROUTER_API_KEY
    baseURL: https://openrouter.ai/api/v1
    defaultModel: anthropic/claude-sonnet-4-6

tasks:
  geoPage:
    provider: gemini-pro
    model: gemini-2.5-pro
    fallback:
      provider: gemini
      model: gemini-2.5-flash
  nichePage:
    provider: gemini-pro
    model: gemini-2.5-pro
    fallback:
      provider: gemini
      model: gemini-2.5-flash
  comparison:
    provider: gemini-pro
    model: gemini-2.5-pro
    fallback:
      provider: gemini
      model: gemini-2.5-flash
  blogPost:
    provider: gemini-pro
    model: gemini-2.5-pro
    fallback:
      provider: gemini
      model: gemini-2.5-flash
  titleRewrite:
    provider: gemini
    model: gemini-2.5-flash
  socialCopy:
    provider: gemini
    model: gemini-2.5-flash
  competitorAudit:
    provider: gemini
    model: gemini-2.5-flash
  dailyResearch:
    provider: gemini-pro
    model: gemini-2.5-pro

# Post March-2026 scaled-content policy:
# Rapid mass publishing on a low-authority domain is the exact footprint the
# update penalizes. Bulk geo/niche/comparison page generation is RETIRED.
# We cap new content to a few deeply-differentiated, human-reviewed blog posts
# per week. The bot only DRAFTS them (review mode, see cli `--publish`); a human
# reviews and merges via pull request before anything goes live.
#
# Cadence: research support Mon/Thu, at most one drafted blog post Tue & Thu
# (2/week, human-gated). No automated page factories. No daily commits.
rotation:
  monday:
    - dailyResearch
  tuesday:
    - dailyResearch
    - blogPost
  wednesday: []
  thursday:
    - dailyResearch
    - blogPost
  friday:
    - competitorAudit
  saturday: []
  sunday: []

# Hard caps act as a safety net behind the rotation. No pages ship at all.
# At most one blog DRAFT per run, and never more than a couple drafts per week
# (enforced by the weekly cap below + the review gate).
circuitBreaker:
  maxPagesPerDay: 0
  maxBlogsPerDay: 1
  maxBlogsPerWeek: 2
  maxCostPerDayUSD: 5.00
  maxApiErrorsBeforeHalt: 3

output:
  reportDir: scripts/seo-bot/output/reports
  socialDir: scripts/seo-bot/output/social
  abTestDir: scripts/seo-bot/output/ab-test

state:
  backlogFile: scripts/seo-bot/state/backlog.yml
  shippedFile: scripts/seo-bot/state/shipped.json
  metricsFile: scripts/seo-bot/state/metrics.json

baseDirs:
  bestFor: src/lib/best-for
  compare: src/lib/compare/data
  blog: content/blog
